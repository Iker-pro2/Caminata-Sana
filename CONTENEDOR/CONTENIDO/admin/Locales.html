<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locales Aliados - Caminata Sana</title>
    <link rel="stylesheet" href="admin.css">
    <style>
        /* Reutilizamos tus estilos de cuadrícula */
        .grid-locales { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; 
            margin-top: 20px;
        }
        
        .card-local { 
            background: white; 
            border-radius: 12px; 
            padding: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-left: 5px solid #2ecc71; /* Verde para locales activos */
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }
        .card-local:hover { transform: translateY(-5px); }
        
        .info-row { margin-bottom: 12px; font-size: 0.9em; line-height: 1.4; }
        .label { font-weight: bold; color: #7f8c8d; display: block; font-size: 0.75em; text-transform: uppercase; margin-bottom: 2px; }
        
        .badge-categoria { 
            background: #e8f5e9; color: #2e7d32; 
            padding: 4px 10px; border-radius: 15px; font-size: 0.75em; font-weight: bold;
        }

        .btn-delete-card { 
            width: 100%; padding: 10px; border: none; border-radius: 6px; 
            cursor: pointer; font-weight: bold; background: #ff7675; color: white; 
            margin-top: auto; transition: 0.3s;
        }
        .btn-delete-card:hover { background: #d63031; }

        .empty-msg { grid-column: 1/-1; text-align: center; padding: 50px; color: #bdc3c7; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Caminata Sana</h2>
        <p>Admin: <strong id="admin-name">Cargando...</strong></p>
        <hr>
        <nav>
            <a href="dashboard.html">🏠 Inicio</a>
            <a href="solicitudes.html">📩 Solicitudes</a>
            <a href="locales.html" class="active">🏪 Locales Aliados</a>
            <a href="usuarios.html">👥 Usuarios</a>
            <a href="#" onclick="logout()" class="logout-btn">🚪 Cerrar Sesión</a>
        </nav>
    </div>

    <div class="main-content">
        <header>
            <h1>Locales Aliados</h1>
            <p>Negocios activos en la red de Caminata Sana (García, N.L.)</p>
        </header>

        <div class="grid-locales" id="contenedor-locales">
            <div class="empty-msg">Cargando locales...</div>
        </div>
    </div>

<script>
    const session = JSON.parse(localStorage.getItem('usuarioCaminataSana'));
    if (!session || session.rol_id !== 1) {
        window.location.href = "../../auth/inicio_Sesion.HTML";
    } else {
        document.getElementById('admin-name').innerText = session.nombre;
    }

    // 1. Centralizamos la URL para no repetir código
    const API_BASE_URL = 'https://caminata-sana.onrender.com/api/admin';
    const NGROK_HEADER = { 'ngrok-skip-browser-warning': 'true' };

    // 📥 CARGAR LOCALES
    async function cargarLocales() {
        try {
            const response = await fetch(`${API_BASE_URL}/locales`, {
                headers: NGROK_HEADER // 👈 Clave para ngrok
            });
            const locales = await response.json();
            
            const contenedor = document.getElementById('contenedor-locales');
            contenedor.innerHTML = '';

            if (locales.length === 0) {
                contenedor.innerHTML = `<div class="empty-msg"><h2>Aún no tienes locales aliados.</h2></div>`;
                return;
            }

            locales.forEach(l => {
                // CORRECCIÓN: Era l.nombre_comercial (con una 'm', no dos)
                contenedor.innerHTML += `
                    <div class="card-local">
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 15px;">
                            <h3 style="margin:0; color:#2c3e50;">${l.nombre_comercial}</h3>
                            <span class="badge-categoria">${l.categoria}</span>
                        </div>
                        
                        <div class="info-row">
                            <span class="label">Ubicación</span>
                            📍 ${l.direccion}
                        </div>

                        <div class="info-row">
                            <span class="label">Coordenadas</span>
                            🌐 ${l.latitud || 'N/A'}, ${l.longitud || 'N/A'}
                        </div>

                        <div class="info-row">
                            <span class="label">Fecha de Alta</span>
                            📅 ${new Date(l.fecha_alta).toLocaleDateString()}
                        </div>

                        <button class="btn-delete-card" onclick="eliminarLocal(${l.local_id})">Eliminar Local</button>
                    </div>
                `;
            });
        } catch (error) {
            console.error("Error:", error);
            document.getElementById('contenedor-locales').innerHTML = '<p style="color:red; text-align:center;">Error al conectar con el servidor.</p>';
        }
    }

    // 🗑️ ELIMINAR LOCAL
    async function eliminarLocal(id) {
        if (!confirm("¿Estás seguro de que quieres eliminar este local? Esta acción no se puede deshacer.")) return;

        try {
            // Cambié localhost por la URL de ngrok para mantener consistencia
            const res = await fetch(`${API_BASE_URL}/eliminar-local/${id}`, {
                method: 'DELETE',
                headers: NGROK_HEADER
            });

            if (res.ok) {
                alert("✅ Local eliminado correctamente.");
                cargarLocales(); 
            } else {
                alert("Error al intentar eliminar el local.");
            }
        } catch (err) {
            alert("Error de conexión.");
        }
    }

    window.onload = cargarLocales;

    function logout() {
        localStorage.removeItem('usuarioCaminataSana');
        window.location.href = "../../auth/INDEX.HTML";
    }
</script>
</body>
</html>
