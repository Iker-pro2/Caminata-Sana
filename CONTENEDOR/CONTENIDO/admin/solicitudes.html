<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes de Afiliación - Caminata Sana</title>
    <link rel="stylesheet" href="admin.css">
    <style>
        /* Estilos para la cuadrícula de solicitudes */
        .grid-solicitudes { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; 
            margin-top: 20px;
        }
        
        .card-solicitud { 
            background: white; 
            border-radius: 12px; 
            padding: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-left: 5px solid #f1c40f; 
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }
        .card-solicitud:hover { transform: translateY(-5px); }
        
        .info-row { margin-bottom: 12px; font-size: 0.9em; line-height: 1.4; }
        .label { font-weight: bold; color: #7f8c8d; display: block; font-size: 0.75em; text-transform: uppercase; margin-bottom: 2px; }
        
        .badge-categoria { 
            background: #e1f5fe; color: #0288d1; 
            padding: 4px 10px; border-radius: 15px; font-size: 0.75em; font-weight: bold;
        }
        
        .reward-box {
            background: #fffdf0; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px dashed #f1c40f;
            margin: 15px 0;
        }

        .actions { display: flex; gap: 10px; margin-top: auto; }
        .btn-small { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.85em; transition: 0.3s; }
        
        .btn-approve-card { background: #2ecc71; color: white; }
        .btn-approve-card:hover { background: #27ae60; }
        
        .btn-reject-card { background: #ecf0f1; color: #95a5a6; }
        .btn-reject-card:hover { background: #dfe6e9; color: #7f8c8d; }

        .empty-msg { grid-column: 1/-1; text-align: center; padding: 50px; color: #bdc3c7; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Caminata Sana</h2>
        <p>Admin: <strong id="admin-name">Cargando...</strong></p>
        <hr>
        <nav>
            <a href="dashboard.html">🏠 Inicio</a>
            <a href="solicitudes.html" class="active">📩 Solicitudes</a>
            <a href="Locales.html">🏪Locales Aliados</a>
            <a href="usuarios.html">👥 Usuarios</a>
            <a href="#" onclick="logout()" class="logout-btn">🚪 Cerrar Sesión</a>
        </nav>
    </div>

    <div class="main-content">
        <header>
            <h1>Solicitudes de Negocios</h1>
            <p>Emprendimientos de García que desean unirse a la red de recompensas.</p>
        </header>

        <div class="grid-solicitudes" id="contenedor-solicitudes">
            <div class="empty-msg">Cargando solicitudes pendientes...</div>
        </div>
    </div>

   <script>
    // 🛡️ SEGURIDAD: Verificar sesión
    const session = JSON.parse(localStorage.getItem('usuarioCaminataSana'));

    if (!session || session.rol_id !== 1) {
        window.location.href = "../../auth/INDEX.HTML";
    } else {
        document.getElementById('admin-name').innerText = session.nombre;
    }

    const API_BASE = 'https://caminata-sana.onrender.com/api/admin';
    const HEADERS_NGROK = { 
        'Content-Type': 'application/json',
        'ngrok-skip-browser-warning': 'true' 
    };

    // 📥 CARGAR SOLICITUDES
    async function cargarSolicitudes() {
        try {
            const response = await fetch(`${API_BASE}/solicitudes`, {
                headers: HEADERS_NGROK
            });
            const solicitudes = await response.json();
            
            const contenedor = document.getElementById('contenedor-solicitudes');
            contenedor.innerHTML = '';

            if (solicitudes.length === 0) {
                contenedor.innerHTML = `
                    <div class="empty-msg">
                        <h2>🎉 ¡Todo al día!</h2>
                        <p>No hay solicitudes pendientes en García por el momento.</p>
                    </div>`;
                return;
            }

            solicitudes.forEach(s => {
                contenedor.innerHTML += `
                    <div class="card-solicitud">
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 15px;">
                            <h3 style="margin:0; color:#2c3e50;">${s.nombre_negocio}</h3>
                            <span class="badge-categoria">${s.categoria}</span>
                        </div>
                        
                        <div class="info-row">
                            <span class="label">Contacto</span>
                            📧 ${s.correo_contacto} 
                        </div>

                        <div class="info-row">
                            <span class="label">Dirección Propuesta</span>
                            📍 ${s.direccion_propuesta || 'Sin dirección'}
                        </div>

                        <div class="reward-box">
                            <span class="label" style="color:#d4a017">Recompensa Ofrecida</span>
                            🎁 <strong>${s.recompensa_ofrecida}</strong> <br>
                            👣 Meta: ${Number(s.pasos_requeridos).toLocaleString()} pasos
                        </div>

                        <div class="actions">
                            <button class="btn-small btn-approve-card" onclick="procesar(${s.solicitud_id}, 'aprobar')">Aceptar</button>
                            <button class="btn-small btn-reject-card" onclick="procesar(${s.solicitud_id}, 'rechazar')">Declinar</button>
                        </div>
                    </div>
                `;
            });
        } catch (error) {
            console.error("Error:", error);
            document.getElementById('contenedor-solicitudes').innerHTML = '<p style="color:red; text-align:center;">Error al conectar con el servidor.</p>';
        }
    }

    // ⚙️ PROCESAR APROBACIÓN O RECHAZO
    async function procesar(id, accion) {
        const confirmar = confirm(`¿Estás seguro de que quieres ${accion} esta solicitud?`);
        if (!confirmar) return;

        try {
            const res = await fetch(`${API_BASE}/${accion}-negocio`, {
                method: 'POST',
                headers: HEADERS_NGROK,
                body: JSON.stringify({ solicitud_id: id })
            });

            if (res.ok) {
                alert(accion === 'aprobar' ? "✅ Negocio integrado correctamente." : "❌ Solicitud declinada.");
                cargarSolicitudes(); // Recargar lista
            } else {
                const errorData = await res.json();
                alert("Error al procesar: " + (errorData.error || "Error desconocido"));
            }
        } catch (err) {
            alert("Error de conexión con el servidor.");
        }
    }

    function logout() {
        localStorage.removeItem('usuarioCaminataSana');
        window.location.href = "../../auth/INDEX.HTML";
    }

    window.onload = cargarSolicitudes;
</script>
</body>
</html>
