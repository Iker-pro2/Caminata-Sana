<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Caminata Sana - Recuperar Contraseña</title>
    <link rel="stylesheet" href="../auth/style.css"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .response-box {
            display: none;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
            animation: fadeIn 0.3s ease;
        }
        .error { background: rgba(231, 76, 60, 0.1); color: #e74c3c; border: 1px solid #e74c3c; }
        .success { background: rgba(39, 174, 96, 0.1); color: #27ae60; border: 1px solid #27ae60; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel"></div>

        <div class="login-card">
            <a href="inicio_Sesion.HTML" class="btn-back" title="Volver al inicio">←</a>

            <h2>Recuperar Cuenta</h2>
            <p style="margin-bottom: 25px; color: #5d6d6e; font-size: 15px;">
                Ingresa tu correo electrónico y te enviaremos un código para restablecer tu contraseña.
            </p>

            <div id="response-msg" class="response-box"></div>

            <form id="forgotForm">
                <div class="input-group">
                    <label for="correo">Correo electrónico asociado</label>
                    <input type="email" id="correo" placeholder="ejemplo@correo.com" required>
                </div>

                <button type="submit" id="btnEnviar">Enviar instrucciones</button>

                <div class="extra-links">
                    <a href="index.html">Volver al inicio de sesión</a>
                    <a href="Regristrate.html">¿No tienes cuenta? Regístrate</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const forgotForm = document.getElementById("forgotForm");
        const btnEnviar = document.getElementById("btnEnviar");
        const responseMsg = document.getElementById("response-msg");

        forgotForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            
            responseMsg.style.display = "none";
            btnEnviar.disabled = true;
            btnEnviar.innerText = "Enviando...";

            const correo = document.getElementById("correo").value.trim();

            try {
                const response = await fetch("http://192.168.0.21:3000/api/olvide-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ correo })
                });

                const data = await response.json();

                if (response.ok) {
                    // --- CLAVE: Guardamos el correo para usarlo en la siguiente página ---
                    localStorage.setItem('email_recuperacion', correo);

                    responseMsg.className = "response-box success";
                    responseMsg.innerText = "¡Código enviado! Redirigiendo para validar...";
                    responseMsg.style.display = "block";
                    
                    setTimeout(() => {
                        window.location.href = "Restablecer.html"; 
                    }, 2000);

                } else {
                    responseMsg.className = "response-box error";
                    responseMsg.innerText = data.error || "Hubo un problema al procesar la solicitud.";
                    responseMsg.style.display = "block";
                    btnEnviar.disabled = false;
                    btnEnviar.innerText = "Enviar instrucciones";
                }
            } catch (error) {
                responseMsg.className = "response-box error";
                responseMsg.innerText = "El servidor no responde. Inténtalo más tarde.";
                responseMsg.style.display = "block";
                btnEnviar.disabled = false;
                btnEnviar.innerText = "Enviar instrucciones";
            }
        });
    </script>
</body>
</html>
