<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Caminata Sana - Validar Código</title>
    <link rel="stylesheet" href="style.css"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .response-box {
            display: none;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
            animation: fadeIn 0.3s ease;
        }
        .error { background: rgba(231, 76, 60, 0.1); color: #e74c3c; border: 1px solid #e74c3c; }
        .success { background: rgba(39, 174, 96, 0.1); color: #27ae60; border: 1px solid #27ae60; }

        .token-input {
            text-align: center;
            font-size: 1.4rem;
            letter-spacing: 8px;
            font-weight: bold;
            text-transform: uppercase;
            color: #2c3e50;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel"></div>

        <div class="login-card">
            <a href="Contraseña_olvidada.html" class="btn-back" title="Volver">←</a>

            <h2>Validar Código</h2>
            <p style="margin-bottom: 25px; color: #5d6d6e; font-size: 15px;">
                Ingresa el código de 6 dígitos que enviamos a tu correo y tu nueva contraseña.
            </p>

            <div id="response-msg" class="response-box"></div>

            <form id="resetForm">
                <div class="input-group">
                    <label for="token">Código de recuperación</label>
                    <input type="text" id="token" class="token-input" placeholder="000000" maxlength="6" required>
                </div>

                <div class="input-group">
                    <label for="nuevaPassword">Nueva Contraseña</label>
                    <input type="password" id="nuevaPassword" placeholder="Mínimo 8 caracteres" required>
                </div>

                <div class="input-group">
                    <label for="confirmarPassword">Confirmar Contraseña</label>
                    <input type="password" id="confirmarPassword" placeholder="Repite tu contraseña" required>
                </div>

                <button type="submit" id="btnRestablecer">Actualizar Contraseña</button>

                <div class="extra-links">
                    <a href="index.html">Cancelar y volver al inicio</a>
                </div>
            </form>
        </div>
    </div>

   <script>
    const resetForm = document.getElementById("resetForm");
    const btnRestablecer = document.getElementById("btnRestablecer");
    const responseMsg = document.getElementById("response-msg");

    resetForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        
        // 1. RECUPERAR Y LIMPIAR EL CORREO DEL STORAGE
        // Usamos .trim() y .toLowerCase() para asegurar coincidencia con el servidor
        const correoRaw = localStorage.getItem('email_recuperacion');
        const correo = correoRaw ? correoRaw.trim().toLowerCase() : null;
        
        const token = document.getElementById("token").value.trim().toUpperCase();
        const nuevaContrasena = document.getElementById("nuevaPassword").value;
        const confirmarPassword = document.getElementById("confirmarPassword").value;

        // Logs de depuración para la consola (F12)
        console.log("Correo para validar:", correo);
        console.log("Token ingresado:", token);

        // Verificación si el correo existe
        if (!correo) {
            showMsg("Error: No se encontró la sesión de recuperación. Vuelve a solicitar el código.", "error");
            return;
        }

        if (nuevaContrasena !== confirmarPassword) {
            showMsg("Las contraseñas no coinciden.", "error");
            return;
        }

        if (nuevaContrasena.length < 8) {
            showMsg("La contraseña debe tener al menos 8 caracteres.", "error");
            return;
        }

        responseMsg.style.display = "none";
        btnRestablecer.disabled = true;
        btnRestablecer.innerText = "Actualizando...";

        try {
            // 2. ENVIAR DATOS AL BACKEND (Puerto 3000)
            const response = await fetch("https://caminata-sana.onrender.com/api/actualizar-password", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    correo: correo, 
                    token: token, 
                    nuevaContrasena: nuevaContrasena 
                })
            });

            const data = await response.json();

            if (response.ok) {
                // LIMPIAR LOCALSTORAGE POR SEGURIDAD
                localStorage.removeItem('email_recuperacion');
                
                showMsg("¡Contraseña actualizada con éxito! Redirigiendo...", "success");
                setTimeout(() => {
                    window.location.href = "index.html"; 
                }, 3000);
            } else {
                // Muestra el error específico del servidor (Código inválido, expirado, etc.)
                showMsg(data.error || "Error al actualizar la contraseña.", "error");
                btnRestablecer.disabled = false;
                btnRestablecer.innerText = "Actualizar Contraseña";
            }
        } catch (error) {
            console.error("Error de conexión:", error);
            showMsg("No se pudo conectar con el servidor. Verifica que esté encendido.", "error");
            btnRestablecer.disabled = false;
            btnRestablecer.innerText = "Actualizar Contraseña";
        }
    });

    function showMsg(text, type) {
        responseMsg.className = `response-box ${type}`;
        responseMsg.innerText = text;
        responseMsg.style.display = "block";
    }
</script>
</body>
</html>
